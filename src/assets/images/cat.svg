<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220" role="img" aria-label="춤추는 고양이">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffd9a8" />
      <stop offset="100%" stop-color="#e89b5c" />
    </radialGradient>
    <radialGradient id="bellyGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff4e3" />
      <stop offset="100%" stop-color="#ffe0bf" />
    </radialGradient>
  </defs>

  <!-- Tail -->
  <path d="M170 150 Q200 120 185 90 Q175 70 160 80"
        fill="none" stroke="#c9803d" stroke-width="14" stroke-linecap="round" />
  <path d="M170 150 Q200 120 185 90 Q175 70 160 80"
        fill="none" stroke="#e89b5c" stroke-width="8" stroke-linecap="round" />

  <!-- Back legs -->
  <ellipse cx="70" cy="190" rx="18" ry="14" fill="#c9803d" />
  <ellipse cx="130" cy="190" rx="18" ry="14" fill="#c9803d" />

  <!-- Body -->
  <ellipse cx="100" cy="155" rx="55" ry="45" fill="url(#bodyGrad)" />

  <!-- Belly -->
  <ellipse cx="100" cy="165" rx="32" ry="28" fill="url(#bellyGrad)" />

  <!-- Front arms (raised for dancing) -->
  <path d="M55 130 Q40 100 50 75" stroke="#c9803d" stroke-width="16" stroke-linecap="round" fill="none" />
  <path d="M145 130 Q160 100 150 75" stroke="#c9803d" stroke-width="16" stroke-linecap="round" fill="none" />
  <circle cx="50" cy="73" r="9" fill="#e89b5c" />
  <circle cx="150" cy="73" r="9" fill="#e89b5c" />

  <!-- Head -->
  <circle cx="100" cy="80" r="48" fill="url(#bodyGrad)" />

  <!-- Ears -->
  <polygon points="60,55 55,15 88,40" fill="#c9803d" />
  <polygon points="65,50 62,25 82,42" fill="#ffb6c1" />
  <polygon points="140,55 145,15 112,40" fill="#c9803d" />
  <polygon points="135,50 138,25 118,42" fill="#ffb6c1" />

  <!-- Face stripes -->
  <path d="M70 60 Q75 55 80 60" stroke="#c9803d" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M120 60 Q125 55 130 60" stroke="#c9803d" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- Eyes -->
  <ellipse cx="82" cy="80" rx="7" ry="9" fill="#1a1a1a" />
  <ellipse cx="118" cy="80" rx="7" ry="9" fill="#1a1a1a" />
  <circle cx="84" cy="76" r="2.5" fill="#ffffff" />
  <circle cx="120" cy="76" r="2.5" fill="#ffffff" />

  <!-- Cheek blush -->
  <circle cx="72" cy="95" r="6" fill="#ffb6c1" opacity="0.7" />
  <circle cx="128" cy="95" r="6" fill="#ffb6c1" opacity="0.7" />

  <!-- Nose -->
  <path d="M96 92 L104 92 L100 98 Z" fill="#ff7a9c" />

  <!-- Mouth -->
  <path d="M100 98 Q94 106 88 102" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round" />
  <path d="M100 98 Q106 106 112 102" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Whiskers -->
  <line x1="65" y1="98" x2="40" y2="92" stroke="#5c3a1d" stroke-width="1.5" stroke-linecap="round" />
  <line x1="65" y1="103" x2="40" y2="105" stroke="#5c3a1d" stroke-width="1.5" stroke-linecap="round" />
  <line x1="135" y1="98" x2="160" y2="92" stroke="#5c3a1d" stroke-width="1.5" stroke-linecap="round" />
  <line x1="135" y1="103" x2="160" y2="105" stroke="#5c3a1d" stroke-width="1.5" stroke-linecap="round" />
</svg>
